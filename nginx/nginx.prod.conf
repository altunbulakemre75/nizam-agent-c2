# ─────────────────────────────────────────────────────────────────────────────
#  NIZAM COP — nginx production reverse proxy
#
#  Features:
#    • TLS 1.2/1.3 with strong ciphers
#    • WebSocket upgrade for /ws path
#    • Security headers (CSP, HSTS, X-Frame, X-Content-Type)
#    • HTTP → HTTPS redirect
#    • Gzip compression for static assets
#    • Rate limiting on ingest endpoint
#    • Client body size limit (64 MB)
#
#  Cert placement:
#    nginx/certs/nizam.crt   — certificate (or chain)
#    nginx/certs/nizam.key   — private key
#
#  To generate self-signed cert (dev/air-gapped):
#    mkdir -p nginx/certs
#    openssl req -x509 -nodes -days 3650 -newkey rsa:4096 \
#      -keyout nginx/certs/nizam.key \
#      -out    nginx/certs/nizam.crt \
#      -subj "/CN=nizam-cop"
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml image/svg+xml;
    gzip_min_length    1024;
    client_max_body_size 64m;

    # ── Rate limiting zones ────────────────────────────────────────────────
    # ingest: 100 req/s per IP, burst 200
    limit_req_zone  $binary_remote_addr  zone=ingest:10m  rate=100r/s;
    # api: 30 req/s per IP, burst 60
    limit_req_zone  $binary_remote_addr  zone=api:10m     rate=30r/s;

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream cop_backend {
        server cop:8100;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────
    server {
        listen       80;
        server_name  _;
        return       301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────
    server {
        listen       443 ssl;
        http2        on;
        server_name  _;

        # TLS
        ssl_certificate      /etc/nginx/certs/nizam.crt;
        ssl_certificate_key  /etc/nginx/certs/nizam.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:
                             ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:
                             ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;

        # ── Security headers ──────────────────────────────────────────
        add_header  Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header  X-Frame-Options            "SAMEORIGIN"  always;
        add_header  X-Content-Type-Options     "nosniff"     always;
        add_header  X-XSS-Protection           "1; mode=block" always;
        add_header  Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header  Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' unpkg.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' unpkg.com; img-src 'self' data: *.tile.openstreetmap.org; connect-src 'self' wss:; font-src 'self';"
            always;

        # ── WebSocket upgrade (COP real-time) ─────────────────────────
        location /ws {
            proxy_pass          http://cop_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_set_header    X-Real-IP  $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto https;
            proxy_read_timeout  86400s;   # keep WS alive
            proxy_send_timeout  86400s;
        }

        # ── Ingest endpoint (high throughput, own rate limit) ─────────
        location /ingest {
            limit_req  zone=ingest  burst=200  nodelay;
            proxy_pass         http://cop_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── API endpoints ─────────────────────────────────────────────
        location /api/ {
            limit_req  zone=api  burst=60  nodelay;
            proxy_pass         http://cop_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── Auth endpoints ────────────────────────────────────────────
        location /auth/ {
            limit_req  zone=api  burst=20  nodelay;
            proxy_pass         http://cop_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── Everything else (static, UI) ──────────────────────────────
        location / {
            proxy_pass         http://cop_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
