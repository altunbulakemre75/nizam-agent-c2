version: "3.9"

# NIZAM Counter-UAS — Faz 0 Infrastructure
# Usage: docker compose -f infra/docker-compose.yml up -d
# Ports (çakışma önlemek için offset +2000 uygulandı):
#   PostgreSQL      : 7432
#   NATS client     : 6222  | monitoring: 6223 | cluster: 6224
#   Redpanda kafka  : 21092 | admin: 11644 | schema: 20081 | pandaproxy: 20082
#   Redpanda Console: 10080
#   Prometheus      : 11090
#   Loki            : 5100
#   Tempo http      : 5200  | otlp-grpc: 6317  | otlp-http: 6318
#   Grafana         : 5000
#   Portainer       : 11443 | http: 11000

networks:
  nizam:
    driver: bridge

volumes:
  postgres_data:
  nats_data:
  redpanda_data:
  grafana_data:
  prometheus_data:
  loki_data:
  tempo_data:
  fts_data:

services:

  # ── PostgreSQL 16 + pgvector ───────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nizam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nizam}
      POSTGRES_USER: ${POSTGRES_USER:-nizam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nizam_dev}
    ports:
      - "7432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nizam
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nizam}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NATS JetStream (Edge Bus) ──────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: nizam-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--name", "nizam-edge"]
    ports:
      - "6222:4222"   # client
      - "6223:8222"   # monitoring
      - "6224:6222"   # cluster
    volumes:
      - nats_data:/data
    networks:
      - nizam
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redpanda (Ana Bus — Kafka API, JVM yok) ────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: nizam-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:21092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:21092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:20082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:20082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:20081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "21092:21092"  # kafka (external)
      - "20081:20081"  # schema registry (external)
      - "20082:20082"  # pandaproxy (external)
      - "11644:9644"   # admin
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - nizam
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redpanda Console ──────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: nizam-redpanda-console
    restart: unless-stopped
    environment:
      CONFIG_FILEPATH: /etc/redpanda-console/config.yaml
    volumes:
      - ./redpanda-console/config.yaml:/etc/redpanda-console/config.yaml:ro
    ports:
      - "10080:8080"
    depends_on:
      - redpanda
    networks:
      - nizam

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nizam-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "11090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - nizam

  # ── Loki (Log Aggregation) ─────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: nizam-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "5100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - nizam

  # ── Tempo (Distributed Tracing) ───────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: nizam-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "5200:3200"   # tempo http
      - "6317:4317"   # otlp grpc
      - "6318:4318"   # otlp http
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    user: "0:0"
    networks:
      - nizam

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nizam-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nizam_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "5000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - nizam

  # ── FreeTAKServer (ATAK mesh için CoT sunucusu) ───────────────
  freetakserver:
    image: rooyca/fts-server:latest
    container_name: nizam-fts
    restart: unless-stopped
    ports:
      - "8087:8087"   # CoT TCP (plaintext dev)
      - "8089:8089"   # CoT TLS (prod için)
      - "8443:8443"   # FTS Web UI
      - "19023:19023" # API
    volumes:
      - fts_data:/opt/FTSData
    networks:
      - nizam

  # ── Portainer (Docker Management UI) ──────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: nizam-portainer
    restart: unless-stopped
    ports:
      - "11443:9443"
      - "11000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/portainer_data:/data
    networks:
      - nizam
