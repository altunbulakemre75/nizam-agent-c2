global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: nizam-cop
    static_configs:
      - targets: ["host.docker.internal:8100"]
    metrics_path: /api/metrics
    scrape_interval: 5s

  - job_name: nats
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /metrics

  - job_name: redpanda
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: /metrics
