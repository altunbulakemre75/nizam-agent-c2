# NIZAM NATS production-leaning config
#
# Auth: nkey + token fallback. Üretimde operatör JWT + decentralized auth
# (nats-account-server) önerilir — bu dev-grade minimum.
#
# Secret'ler Docker secrets veya env'den okunur.
# Dev için: infra/nats/nkeys.txt üretilmeli (bkz. scripts/gen_nats_keys.sh).

# ── Temel server ─────────────────────────────────────────────────
server_name: nizam-edge
port: 4222
monitor_port: 8222
jetstream: {}

# ── Auth ─────────────────────────────────────────────────────────
authorization {
    # NKEY tabanlı user'lar — publisher/subscriber roller ayrılır
    users = [
        {
            # Full publisher — kamera, rf, bridge servisleri
            nkey: $NIZAM_NATS_PUBLISHER_NKEY
            permissions: {
                publish: { allow: ["nizam.raw.>", "nizam.tracks.>"] }
                subscribe: { allow: [] }
            }
        }
        {
            # Full subscriber — fusion, gateway, cot worker'lar
            nkey: $NIZAM_NATS_SUBSCRIBER_NKEY
            permissions: {
                subscribe: { allow: ["nizam.>"] }
                publish: { allow: ["nizam.tracks.active"] }   # fusion → downstream
            }
        }
    ]
}

# ── Logging ──────────────────────────────────────────────────────
debug: false
trace: false
logtime: true
