[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'python -m uvicorn cop.server:app --host 0.0.0.0 --port ${PORT:-8100} --log-level info'"
healthcheckPath = "/api/metrics"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
AUTH_ENABLED = "false"
RATE_LIMIT_ENABLED = "true"
DB_ENABLED = "false"
