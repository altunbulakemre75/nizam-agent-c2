---
# Orchestrator Service
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: nizam
  labels:
    app: orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8200
      targetPort: 8200
      protocol: TCP
---
# Orchestrator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: nizam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: nizam-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8200
          envFrom:
            - configMapRef:
                name: nizam-config
            - secretRef:
                name: nizam-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
