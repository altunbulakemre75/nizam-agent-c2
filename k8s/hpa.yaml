---
# HorizontalPodAutoscaler — COP sunucusunu yüke göre ölçeklendir
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cop-hpa
  namespace: nizam
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cop
  minReplicas: 2
  maxReplicas: 8
  metrics:
    # CPU kullanımı %70'i geçerse yeni pod ekle
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Memory kullanımı %80'i geçerse yeni pod ekle
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
