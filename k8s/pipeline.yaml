---
# Pipeline Job — runs agent simulation for specified duration
apiVersion: batch/v1
kind: Job
metadata:
  name: pipeline
  namespace: nizam
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: pipeline
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-cop
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for cop:8100..."
              until nc -z cop 8100; do sleep 2; done
              echo "COP ready."
      containers:
        - name: pipeline
          image: nizam-cop:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - run_pipeline.py
            - --cop_url
            - http://cop:8100
            - --orchestrator_url
            - http://orchestrator:8200
            - --origin_lat
            - "41.015"
            - --origin_lon
            - "28.979"
            - --duration_s
            - "3600"
            - --rate_hz
            - "1.0"
            - --scenario
            - scenarios/swarm_attack.json
          envFrom:
            - configMapRef:
                name: nizam-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
