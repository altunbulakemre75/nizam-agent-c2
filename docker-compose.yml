version: "3.9"

# ─────────────────────────────────────────────────────────────
#  NIZAM COP — Docker Compose
#
#  Services:
#    db           — TimescaleDB (PostgreSQL 15 + timescaledb extension)
#    orchestrator — Agent registry & heartbeat (port 8200)
#    cop          — COP server: REST + WebSocket + UI (port 8100)
#    pipeline     — Agent pipeline (world→radar→rf→fuser→cop_publisher)
#    prometheus   — Metrics scraper (port 9090)
#    grafana      — Dashboard UI (port 3000, admin/nizam)
#
#  Quick start:
#    cp .env.example .env
#    docker compose up --build
#
#  Monitoring:
#    Grafana  → http://localhost:3000  (admin / nizam)
#    Prometheus → http://localhost:9090
#
#  With auth:
#    AUTH_ENABLED=true in .env, then register first user via /auth/register
# ─────────────────────────────────────────────────────────────

x-common-env: &common-env
  DATABASE_URL:         ${DATABASE_URL:-postgresql+asyncpg://nizam:nizam@db:5432/nizam}
  AUTH_ENABLED:         ${AUTH_ENABLED:-false}
  JWT_SECRET:           ${JWT_SECRET:-nizam-dev-secret-CHANGE-in-production}
  JWT_EXPIRE_MINUTES:   ${JWT_EXPIRE_MINUTES:-480}
  ORCHESTRATOR_URL:     http://orchestrator:${ORCH_PORT:-8200}
  LLM_PROVIDER:         ${LLM_PROVIDER:-ollama}
  ANTHROPIC_API_KEY:    ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
  OLLAMA_URL:           ${OLLAMA_URL:-http://host.docker.internal:11434}
  LLM_MODEL:            ${LLM_MODEL:-llama3.2}

services:

  # ── Database ───────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER:     nizam
      POSTGRES_PASSWORD: nizam
      POSTGRES_DB:       nizam
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nizam -d nizam"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Orchestrator ───────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - "${ORCH_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8200/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── COP Server ─────────────────────────────────────────────
  cop:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - "${COP_PORT:-8100}:8100"
    depends_on:
      db:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/api/tracks')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Agent Pipeline ─────────────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    environment:
      <<: *common-env
    depends_on:
      cop:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    command:
      - python
      - run_pipeline.py
      - --cop_url
      - http://cop:${COP_PORT:-8100}
      - --orchestrator_url
      - http://orchestrator:${ORCH_PORT:-8200}
      - --origin_lat
      - "41.015"
      - --origin_lon
      - "28.979"
      - --duration_s
      - "3600"
      - --rate_hz
      - "1.0"
      - --scenario
      - scenarios/swarm_attack.json

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      cop:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nizam}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/nizam.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

volumes:
  db_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
