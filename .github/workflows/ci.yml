name: NIZAM CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit + integration tests ──────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install PyTorch CPU-only first to avoid pulling CUDA (~2 GB)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=ai --cov=cop --cov=agents \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Check core imports (eski COP)
        run: |
          python -c "from ai import anomaly, predictor, roe, tactical, timeline, zone_breach, coordinated_attack, ml_threat, track_fsm"
          python -c "from ai import fusion"
          python -c "from replay import recorder, player"
          python -c "from cop import server"
          python -c "from adapters import cot_adapter, sensor_adapter_base"

      - name: Check new service imports (counter-UAS v2)
        run: |
          python -c "from services.detectors.camera.yolo_service import build_detection_event"
          python -c "from services.detectors.rf.odid_parser import parse_message"
          python -c "from services.detectors.rf.odid_service import build_odid_event"
          python -c "from services.detectors.rf.wifi_oui_service import mac_to_oui"
          python -c "from services.fusion.kf_engine import make_cv_filter"
          python -c "from services.fusion.track_manager import TrackManager"
          python -c "from services.fusion.association import associate"
          python -c "from services.fusion.imm_engine import make_imm_filter"
          python -c "from services.fusion.model_matcher import DroneCatalog"
          python -c "from services.fusion.fusion_service import FusionService"
          python -c "from services.gateway.track_gateway import ConnectionHub"
          python -c "from services.cot.cot_builder import build_cot_event"
          python -c "from services.cot.fusion_to_cot import track_to_cot"
          python -c "from services.cot.odid_to_cot import odid_event_to_cot"
          python -c "from services.cot.enrichment import enrich_event"
          python -c "from services.cot.validator import validate_structure"
          python -c "from services.cot.workers import FusionTrackWorker"
          python -c "from services.decision.rules import assess_threat"
          python -c "from services.decision.roe import load_roe, evaluate_roe"
          python -c "from services.decision.threat_graph import decide"
          python -c "from services.decision.llm_advisor import reconcile"
          python -c "from services.autonomy.geofence import NoFlyZone, violates_geofence"
          python -c "from services.autonomy.intercept_planner import plan_intercept"
          python -c "from services.autonomy.mavsdk_sender import MAVSDKSender"
          python -c "from services.bridge.cop_to_nats import pull_cop_tracks"

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          ruff check ai/ cop/ agents/ adapters/ services/ tests/ \
            --select E,W,F \
            --ignore E501,W503,E402,F401 \
            --output-format=github

  # ── Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          bandit -r ai/ cop/ agents/ adapters/ \
            -ll \
            --skip B101,B311,B314,B320,B403,B404,B603,B607 \
            -f github

  # ── End-to-end smoke test ─────────────────────────────────────────────────
  smoke:
    name: E2E smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Run smoke test
        # Boots the COP server, runs a 12s single_drone pipeline end-to-end,
        # and asserts on /api/metrics (ingest_total > 0, tactical.ran > 0,
        # tactical.failed == 0, no overlap under light load).
        run: python scripts/smoke_test.py --duration 12
