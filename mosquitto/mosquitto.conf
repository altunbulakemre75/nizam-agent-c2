# ─────────────────────────────────────────────────────────────────────────────
#  NIZAM COP — Eclipse Mosquitto MQTT broker configuration
#
#  Listens on:
#    1883  — plain MQTT  (LAN sensors, restrict to LAN via firewall)
#    8883  — MQTT/TLS    (external sensors with client cert or password)
#
#  Authentication:
#    Password file at /mosquitto/config/passwd (created by mosquitto_passwd)
#    To add a sensor user:
#      docker compose -f docker-compose.prod.yml exec mqtt \
#        mosquitto_passwd -b /mosquitto/config/passwd sensor1 <password>
#
#  ACL: all authenticated clients can publish to nizam/# and subscribe to #
#  Tighten per-sensor ACLs in a separate acl_file if needed.
# ─────────────────────────────────────────────────────────────────────────────

# ── Plain listener (LAN only) ─────────────────────────────────────────────
listener 1883
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/passwd

# ── TLS listener (external) ───────────────────────────────────────────────
# Uncomment and provide certs to enable:
# listener 8883
# protocol mqtt
# cafile   /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile  /mosquitto/config/certs/server.key
# tls_version tlsv1.2
# require_certificate false
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
autosave_interval 300

# ── Logging ───────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Limits ────────────────────────────────────────────────────────────────
max_connections 500
max_inflight_messages 100
max_queued_messages 1000
message_size_limit 262144    # 256 KB
